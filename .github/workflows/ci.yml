name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run unit tests
        run: node tests/base.test.cjs && node tests/schema.test.cjs

      - name: Fetch upstream binary
        run: |
          mkdir -p pipeline/upstream
          npm pack @anthropic-ai/claude-code --pack-destination /tmp
          tar xzf /tmp/anthropic-ai-claude-code-*.tgz -C pipeline/upstream

      - name: Build patched binary
        run: node pipeline/patch.cjs
