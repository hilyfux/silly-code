name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642195f882660b323a28e09 # v4.4.0
        with:
          node-version: "20"

      - name: Run unit tests
        run: node tests/base.test.cjs && node tests/schema.test.cjs

      - name: Build patched binary
        run: node pipeline/patch.cjs
